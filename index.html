<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VilPorter to QBO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* Quick layout styles for the new sidebar */
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .navbar { flex-shrink: 0; z-index: 10; }
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding-top: 1rem; overflow-y: auto; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 1rem 1.5rem; border-left: 4px solid transparent; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left-color: #27ae60; }
        .sidebar-header { padding: 0 1.5rem 1rem 1.5rem; font-size: 0.85rem; text-transform: uppercase; color: #6c757d; font-weight: bold; letter-spacing: 1px; }
        #app-root { flex: 1; overflow-y: auto; padding: 2rem; background: #e9ecef; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 8px; width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo-group">
            <div class="logo">VilPorter to QBO</div>
            <div id="qbo-container" class="qbo-container"></div>
        </div>
        <nav>
            <a href="#/admin" class="nav-link">Admin Center</a>
            <button id="authBtn" class="btn outline">Login</button>
        </nav>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <div class="sidebar-header">Integrations</div>
            <a href="#/" class="sidebar-link active" data-route="#/">Amazon</a>
            <a href="#/shopify" class="sidebar-link" data-route="#/shopify">Shopify</a>
            <a href="#/paypal" class="sidebar-link" data-route="#/paypal">PayPal</a>
            <a href="#/ebay" class="sidebar-link" data-route="#/ebay">eBay</a>
            <div class="sidebar-header" style="margin-top: 2rem;">Banking</div>
            <a href="#/bank" class="sidebar-link" data-route="#/bank">Bank Accounts</a>
            <a href="#/creditcard" class="sidebar-link" data-route="#/creditcard">Credit Cards</a>
        </aside>

        <main id="app-root">
            <div class="loader" style="text-align: center;">Initializing Application...</div>
        </main>
    </div>

    <div id="rejectionModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: #e74c3c; margin-top:0;">⚠️ Duplicates Rejected</h2>
            <p>The following transactions were skipped because they already exist in QuickBooks (matched by Date, Settlement ID, and Amount).</p>
            <div id="rejectionTableContainer" style="margin: 1rem 0;"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 1rem;">
                <button class="btn outline" onclick="document.getElementById('rejectionModal').style.display='none'" style="color: black; border-color: #ccc;">Close</button>
                <button id="downloadRejectsBtn" class="btn">Download Excel (CSV)</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
